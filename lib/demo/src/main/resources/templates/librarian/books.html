<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Manage Books</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2"><i class="fas fa-book"></i> Manage Books</h1>
            <a th:href="@{/librarian/books/add}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add New Book
            </a>
        </div>

        <!-- Search -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/librarian/books}" method="get" class="row g-3">
                            <div class="col-md-10">
                                <input type="text" class="form-control" name="search" 
                                       th:value="${search}" placeholder="Search books by title, author, ISBN, or category...">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-search"></i> Search
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Books Table -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-list"></i> Books List</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(books)}" class="text-center py-4">
                            <i class="fas fa-book fa-3x text-muted mb-3"></i>
                            <h5 class="text-muted">No books found</h5>
                            <p class="text-muted">Add some books to get started.</p>
                            <a th:href="@{/librarian/books/add}" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Add First Book
                            </a>
                        </div>
                        
                        <div th:if="${!#lists.isEmpty(books)}">
                            <div class="table-responsive">
                                <table class="table table-striped">
                                    <thead>
                                        <tr>
                                            <th>Title</th>
                                            <th>Author</th>
                                            <th>ISBN</th>
                                            <th>Category</th>
                                            <th>Total Copies</th>
                                            <th>Available</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="book : ${books}">
                                            <td th:text="${book.title}"></td>
                                            <td th:text="${book.author}"></td>
                                            <td th:text="${book.isbn}"></td>
                                            <td>
                                                <span class="badge bg-secondary" th:text="${book.category}"></span>
                                            </td>
                                            <td th:text="${book.totalCopies}"></td>
                                            <td>
                                                <span class="badge" 
                                                      th:classappend="${book.availableCopies > 0} ? 'bg-success' : 'bg-danger'"
                                                      th:text="${book.availableCopies}">
                                                </span>
                                            </td>
                                            <td>
                                                <a th:href="@{/librarian/books/edit/{id}(id=${book.id})}" 
                                                   class="btn btn-sm btn-outline-primary me-1">
                                                    <i class="fas fa-edit"></i> Edit
                                                </a>
                                                <form th:action="@{/librarian/books/delete/{id}(id=${book.id})}" 
                                                      method="post" class="d-inline">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                                            onclick="return confirm('Are you sure you want to delete this book?')">
                                                        <i class="fas fa-trash"></i> Delete
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
