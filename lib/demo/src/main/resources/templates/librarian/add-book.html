<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Add New Book</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2"><i class="fas fa-plus"></i> Add New Book</h1>
            <a th:href="@{/librarian/books}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Books
            </a>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-book"></i> Book Information</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/librarian/books/add}" th:object="${book}" method="post">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="title" class="form-label">Title *</label>
                                    <input type="text" class="form-control" id="title" th:field="*{title}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="author" class="form-label">Author *</label>
                                    <input type="text" class="form-control" id="author" th:field="*{author}" required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="isbn" class="form-label">ISBN *</label>
                                    <input type="text" class="form-control" id="isbn" th:field="*{isbn}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="category" class="form-label">Category *</label>
                                    <input type="text" class="form-control" id="category" th:field="*{category}" 
                                           placeholder="e.g., Programming, Literature, Science" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" 
                                          rows="3" placeholder="Brief description of the book"></textarea>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="totalCopies" class="form-label">Total Copies *</label>
                                    <input type="number" class="form-control" id="totalCopies" th:field="*{totalCopies}" 
                                           min="1" value="1" required>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/librarian/books}" class="btn btn-secondary me-md-2">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Add Book
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h6><i class="fas fa-info-circle"></i> Guidelines</h6>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled">
                            <li class="mb-2">
                                <i class="fas fa-check text-success"></i> 
                                <small>Ensure ISBN is unique</small>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-check text-success"></i> 
                                <small>Use consistent category names</small>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-check text-success"></i> 
                                <small>Available copies will be set equal to total copies</small>
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-check text-success"></i> 
                                <small>All fields marked with * are required</small>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
