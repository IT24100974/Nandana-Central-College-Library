<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Edit Profile</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        .page-header {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.3);
        }
        
        .nav-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #475569;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.3);
            color: white;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.4);
            color: white;
        }
        
        .content-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            margin: 0 auto 2rem;
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.3);
        }
        
        .debug-info {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 1px solid #bae6fd;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-left: 4px solid #06b6d4;
        }
        
        .debug-info h5 {
            color: #0891b2;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .debug-info ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .debug-info li {
            padding: 0.5rem 0;
            border-bottom: 1px solid #e0f2fe;
            display: flex;
            justify-content: space-between;
        }
        
        .debug-info li:last-child {
            border-bottom: none;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .nav-buttons {
                justify-content: center;
            }
            
            .content-card {
                padding: 1.5rem;
                margin: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="fas fa-user-edit me-2"></i>Edit Profile</h1>
            <p class="mb-0 opacity-90">Update your personal information and preferences</p>
        </div>
        
        <!-- Navigation -->
        <div class="nav-buttons">
            <a th:href="@{/student/profile}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Profile
            </a>
        </div>
        
        <!-- Main Content -->
        <div class="content-card">
            <!-- Profile Avatar -->
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            
            <!-- Debug Info -->
            <div class="debug-info">
                <h5><i class="fas fa-info-circle me-2"></i>System Information</h5>
                <ul>
                    <li>
                        <span>User:</span>
                        <span th:text="${user != null ? user.username : 'No user'}">Loading...</span>
                    </li>
                    <li>
                        <span>Full Name:</span>
                        <span th:text="${user != null ? user.fullName : 'No name'}">Loading...</span>
                    </li>
                    <li>
                        <span>Email:</span>
                        <span th:text="${user != null ? user.email : 'No email'}">Loading...</span>
                    </li>
                </ul>
            </div>
            
            <!-- Edit Form -->
            <form method="post" th:action="@{/student/profile/edit}">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName" class="form-label">
                            <i class="fas fa-user me-2"></i>Full Name
                        </label>
                        <input type="text" class="form-control" id="fullName" name="fullName" 
                               th:value="${user != null ? user.fullName : ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="username" class="form-label">
                            <i class="fas fa-at me-2"></i>Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" 
                               th:value="${user != null ? user.username : ''}" readonly
                               style="background-color: #f3f4f6; cursor: not-allowed;">
                        <small class="text-muted">Username cannot be changed</small>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email" 
                               th:value="${user != null ? user.email : ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone" class="form-label">
                            <i class="fas fa-phone me-2"></i>Phone Number
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               placeholder="Enter your phone number">
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
