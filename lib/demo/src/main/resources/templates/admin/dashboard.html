<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>System Admin Dashboard</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .dashboard-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(30, 41, 59, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .dashboard-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }
        
        .dashboard-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .dashboard-header .date-info {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 500;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-btn {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            color: white;
        }

        .profile-btn {
            background: rgba(79, 172, 254, 0.2);
            border-color: rgba(79, 172, 254, 0.4);
        }

        .profile-btn:hover {
            background: rgba(79, 172, 254, 0.4);
            border-color: rgba(79, 172, 254, 0.6);
        }

        .logout-btn {
            background: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.4);
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.4);
            border-color: rgba(220, 53, 69, 0.6);
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem 1rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: none;
            height: 100%;
            text-align: center;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }
        
        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: white;
            margin: 0 auto 0.75rem auto;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:nth-child(1) .stat-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .stat-card:nth-child(2) .stat-icon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stat-card:nth-child(3) .stat-icon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .stat-card:nth-child(4) .stat-icon {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.25rem;
            line-height: 1;
        }
        
        .stat-label {
            color: #64748b;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        
        .content-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .content-card .card-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            border: none;
            padding: 1.5rem 2rem;
            border-radius: 0;
        }
        
        .content-card .card-header h5 {
            font-weight: 700;
            font-size: 1.3rem;
            margin: 0;
        }
        
        .content-card .card-body {
            padding: 2rem;
        }
        
        .quick-action-btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.25rem 0.75rem;
            text-decoration: none;
            color: #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 110px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        
        .quick-action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        
        .quick-action-btn:hover::before {
            left: 100%;
        }
        
        .quick-action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            color: white;
            text-decoration: none;
        }
        
        .quick-action-btn.btn-primary:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }
        
        .quick-action-btn.btn-success:hover {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border-color: #43e97b;
        }
        
        .quick-action-btn.btn-warning:hover {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border-color: #fa709a;
        }
        
        .quick-action-btn.btn-info:hover {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: #4facfe;
        }
        
        .quick-action-btn i {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .quick-action-btn:hover i {
            transform: scale(1.05);
        }
        
        .quick-action-btn span {
            font-weight: 600;
            font-size: 0.8rem;
            line-height: 1.2;
        }
        
        .table {
            border: none;
        }
        
        .table thead th {
            border: none;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
            font-weight: 700;
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table tbody tr {
            border: none;
            transition: all 0.3s ease;
        }
        
        .table tbody tr:hover {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            transform: scale(1.01);
        }
        
        .table tbody td {
            border: none;
            padding: 1.5rem;
            vertical-align: middle;
        }
        
        .avatar-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .badge {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
        
        .empty-state p {
            color: #64748b;
            font-size: 1.1rem;
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .table-responsive {
            border-radius: 12px;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
            }

            .dashboard-header h1 {
                font-size: 2rem;
            }

            .header-left {
                align-items: center;
            }

            .header-actions {
                justify-content: center;
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            .admin-btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }

            .admin-btn span {
                display: none;
            }
            
            .stat-card {
                padding: 1rem 0.75rem;
            }
            
            .stat-icon {
                width: 40px;
                height: 40px;
                font-size: 1rem;
                margin-bottom: 0.5rem;
            }
            
            .stat-number {
                font-size: 1.5rem;
            }
            
            .stat-label {
                font-size: 0.7rem;
                line-height: 1.1;
            }
            
            .quick-action-btn {
                height: 90px;
                padding: 0.75rem 0.5rem;
            }
            
            .quick-action-btn i {
                font-size: 1.5rem;
                margin-bottom: 0.25rem;
            }
            
            .quick-action-btn span {
                font-size: 0.7rem;
                line-height: 1.1;
            }
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <!-- Dashboard Header -->
        <div class="dashboard-header d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center">
            <div class="header-left">
                <h1><i class="fas fa-shield-alt me-3"></i>System Admin Dashboard</h1>
                <div class="date-info">
                    <i class="fas fa-calendar-alt me-2"></i>
                    <span th:text="${#temporals.format(#temporals.createNow(), 'EEEE, MMMM dd, yyyy')}"></span>
                </div>
            </div>
            <div class="header-actions d-flex align-items-center gap-3">
                <a th:href="@{/admin/profile}" class="admin-btn profile-btn" title="Admin Profile">
                    <i class="fas fa-user-cog me-2"></i>
                    <span>Profile</span>
                </a>
                <a th:href="@{/logout}" class="admin-btn logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt me-2"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div class="d-grid gap-4 mb-5">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-number" th:text="${totalUsers}">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-book"></i>
                </div>
                <div class="stat-number" th:text="${totalBooks}">0</div>
                <div class="stat-label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-exchange-alt"></i>
                </div>
                <div class="stat-number" th:text="${borrowedBooksCount}">0</div>
                <div class="stat-label">Active Borrows</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-bell"></i>
                </div>
                <div class="stat-number" th:text="${activeNotificationsCount}">0</div>
                <div class="stat-label">Active Notifications</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="row mb-5">
            <div class="col-md-12">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="fas fa-bolt me-2"></i>Quick Actions</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-3">
                            <a th:href="@{/admin/users/add}" class="quick-action-btn btn-primary">
                                <i class="fas fa-user-plus"></i>
                                <span>Add New User</span>
                            </a>
                            <a th:href="@{/admin/notifications/add}" class="quick-action-btn btn-success">
                                <i class="fas fa-bell"></i>
                                <span>Create Notification</span>
                            </a>
                            <a th:href="@{/admin/rules}" class="quick-action-btn btn-warning">
                                <i class="fas fa-cogs"></i>
                                <span>Configure Rules</span>
                            </a>
                            <a th:href="@{/admin/reports}" class="quick-action-btn btn-info">
                                <i class="fas fa-chart-bar"></i>
                                <span>View Reports</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Users -->
        <div class="row">
            <div class="col-md-12">
                <div class="content-card">
                    <div class="card-header">
                        <h5><i class="fas fa-user-clock me-2"></i>Recent Users</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(recentUsers)}" class="empty-state">
                            <i class="fas fa-users"></i>
                            <p>No users found.</p>
                        </div>
                        <div th:if="${!#lists.isEmpty(recentUsers)}">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th><i class="fas fa-user me-2"></i>Full Name</th>
                                            <th><i class="fas fa-at me-2"></i>Username</th>
                                            <th><i class="fas fa-envelope me-2"></i>Email</th>
                                            <th><i class="fas fa-user-tag me-2"></i>Role</th>
                                            <th><i class="fas fa-toggle-on me-2"></i>Status</th>
                                            <th><i class="fas fa-calendar me-2"></i>Created</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="user : ${recentUsers}" class="fade-in-up">
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <div class="avatar-circle me-3">
                                                        <i class="fas fa-user"></i>
                                                    </div>
                                                    <strong th:text="${user.fullName}"></strong>
                                                </div>
                                            </td>
                                            <td>
                                                <code th:text="${user.username}"></code>
                                            </td>
                                            <td th:text="${user.email}"></td>
                                            <td>
                                                <span class="badge rounded-pill" 
                                                      th:classappend="${user.role.name() == 'SYSTEM_ADMIN'} ? 'bg-danger' : 
                                                                     (${user.role.name() == 'LIBRARIAN'} ? 'bg-primary' : 
                                                                     (${user.role.name() == 'LIBRARY_ASSISTANT'} ? 'bg-info' : 
                                                                     (${user.role.name() == 'DEPUTY_PRINCIPAL'} ? 'bg-warning' : 'bg-success')))"
                                                      th:text="${user.role}">
                                                </span>
                                            </td>
                                            <td>
                                                <span class="badge rounded-pill" 
                                                      th:classappend="${user.enabled} ? 'bg-success' : 'bg-danger'"
                                                      th:text="${user.enabled} ? 'Active' : 'Disabled'">
                                                </span>
                                            </td>
                                            <td>
                                                <small class="text-muted" th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}"></small>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
